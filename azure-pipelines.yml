# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- dev # branch where the pipeline should be triggered (changed from main to dev)
# we can add more than one branch

resources:
- repo: self # working repository where the pipeline yaml file is present

variables:
  # Container registry service connection established during pipeline creation
  # dockerRegistryServiceConnection: 'aa369cc9-2546-466a-b0ea-1dfe67b659c5'
  # imageRepository: 'productsmicroservice'
  # containerRegistry: 'jcdotnetecommerceregistry.azurecr.io'
  # dockerfilePath: '$(Build.SourcesDirectory)/eCommerce.API/Dockerfile'
  # tag: '$(Build.BuildId)'
  # changing to name/value notation (both are correct)
  
  # Service connection that acts as bridge between the pipeline and the ACR
  - name: dockerRegistryServiceConnection
    value: 'aa369cc9-2546-466a-b0ea-1dfe67b659c5'
  - name: imageRepository
    value: 'products-microservice'
  - name: containerRegistry
    value: 'jcdotnetecommerceregistry.azurecr.io'
  - name: dockerfilePath
    value: '$(Build.SourcesDirectory)/eCommerce.API/Dockerfile'
  - name: tag
    value: '$(Build.BuildId)'

  # Agent VM image name
  - name: vmImageName
    value: 'ubuntu-latest'
  - name: windowsImageName
    value: 'windows-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Docker Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
        buildContext: $(Build.SourcesDirectory)

- stage: Test
  displayName: Test and publish results stage
  jobs:
  - job: RunTest
    displayName: Run Unit Tests
    pool:
      vmImage: $(windowsImageName)
    steps:
    - checkout: self
      displayName: Checkout source code
 
    - task: NuGetToolInstaller@1
      displayName: Install NuGetTool

    - task: NuGetCommand@2
      displayName: Restore NuGet Packages
      inputs:
        command: 'restore'
        restoreSolution: '**/*.slnx'
        
    - task: MSBuild@1
      displayName: Build solution
      inputs:
        solution: '**/*.slnx'
        msbuildArchitecture: 'x64'
        platform: 'Any CPU'
        configuration: 'Release'
        msbuildArguments: '/p:Configuration=Release'
    
    - task: VSTest@3
      displayName: Test Products Service
      inputs:
        testSelector: 'testAssemblies'
        testAssemblyVer2: |
          **\ProductsService.Test.dll
        searchFolder: '$(System.DefaultWorkingDirectory)'
        runTestsInIsolation: true
        codeCoverageEnabled: true